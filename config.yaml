name: "OCPP Proxy"
description: >
  OCPP WebSocket proxy and charger simulator. Supports three modes: proxy
  (transparent OCPP proxy between your charger and the upstream server),
  masquerade (proxy that rewrites BootNotification identity fields), and
  simulate (fake charger that connects to the upstream and logs any
  portal-initiated commands).
version: "1.0.0"
slug: ocpp_proxy
url: "https://github.com/DJBenson/ocpp-proxy"
init: false
arch:
  - aarch64
  - amd64
  - armv7

options:
  mode: "proxy"
  upstream: ""
  verbose: false
  # proxy / masquerade mode options
  host: "0.0.0.0"
  port: 7655
  tls: false
  cert: ""
  key: ""
  upstream_password: ""
  upstream_charge_point_id: ""
  # masquerade mode options (leave blank to keep the real charger's value)
  masquerade_vendor: ""
  masquerade_model: ""
  masquerade_firmware: ""
  masquerade_serial: ""
  # simulate mode options
  charge_point_id: ""
  vendor: ""
  model: ""
  firmware: ""
  serial: ""

schema:
  mode: "list(proxy|masquerade|simulate)"
  upstream: str
  verbose: bool
  # proxy / masquerade mode options
  host: str
  port: int
  tls: bool
  cert: str?
  key: str?
  upstream_password: str?
  upstream_charge_point_id: str?
  # masquerade mode options
  masquerade_vendor: str?
  masquerade_model: str?
  masquerade_firmware: str?
  masquerade_serial: str?
  # simulate mode options
  charge_point_id: str?
  vendor: str
  model: str
  firmware: str
  serial: str?

ports:
  7655/tcp: 7655

ports_description:
  7655/tcp: "OCPP WebSocket proxy (charger-facing)"

map:
  - ssl:ro
